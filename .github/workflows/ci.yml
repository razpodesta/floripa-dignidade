name: CI

on:
  push:
    branches:
      - main # Cambiado de master a main según tus capturas de pantalla previas
  pull_request:

# Estándar de seguridad: Mínimos privilegios necesarios
permissions:
  actions: read
  contents: read

jobs:
  main:
    runs-on: ubuntu-latest
    steps:
      # 1. Checkout con historial completo para que Nx pueda comparar versiones (necesario para affected)
      - name: Checkout Repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 2. Setup de pnpm (usando v4 como en tu base)
      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      # 3. Setup de Node.js con Cache agresiva de pnpm
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      # 4. Instalación de dependencias (estricta para CI)
      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      # 5. Instalación de Playwright (solo las dependencias de sistema necesarias)
      - name: Install Playwright Browsers
        run: pnpm exec playwright install --with-deps

      # 6. Determinar el rango de comparación para Nx (Vital para el sistema Lego)
      # Esto permite a Nx saber qué "bloques" han cambiado desde el último commit exitoso.
      - name: Derive appropriate SHAs for help with affected commands
        uses: nrwl/nx-set-shas@v4

      # 7. EJECUCIÓN DE TAREAS (Arquitectura Lego en acción)
      # Usamos 'affected' en lugar de 'run-many' para ahorrar tiempo y recursos.
      # Solo probaremos los módulos que tocaste o los que se ven afectados por tus cambios.
      - name: Run Quality Gate (Affected)
        run: pnpm exec nx affected -t lint test build typecheck e2e --parallel=3

      # 8. Nx Cloud Self-Healing
      # Si algo falla, la IA de Nx intentará darte la solución exacta en el log.
      - name: Nx Cloud Fix-CI
        run: pnpm exec nx fix-ci
        if: always()
